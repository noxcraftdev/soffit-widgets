description = "System stats: CPU 1-minute load average, memory usage, and uptime"
components = ["cpu", "mem", "uptime"]
has_compact = true

[theme.value]
label = "Value"
palette_role = "subtle"

[theme.icon]
label = "Icon"
palette_role = "muted"

[theme.healthy]
label = "Healthy"
palette_role = "success"

[theme.warning]
label = "Warning"
palette_role = "warning"

[theme.critical]
label = "Critical"
palette_role = "danger"

[icons.cpu]
label = "CPU Icon"
icons_field = "cpu"
default_value = "\u26a1"
is_char = false

[icons.mem]
label = "Memory Icon"
icons_field = "mem"
default_value = "\U0001f9e0"
is_char = false

[icons.uptime]
label = "Uptime Icon"
icons_field = "uptime"
default_value = "\u231b"
is_char = false
