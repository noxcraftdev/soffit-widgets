description = "Last interaction timestamp + cache token usage"
components = ["time", "cache"]
has_compact = true

[theme.time]
label = "Timestamp"
palette_role = "subtle"

[theme.label]
label = "Label"
palette_role = "muted"

[theme.cache_read]
label = "Cache Read"
palette_role = "success"

[theme.cache_write]
label = "Cache Write"
palette_role = "warning"

[icons.icon]
label = "Icon"
icons_field = "icon"
default_value = "\u23F1 "
is_char = false
