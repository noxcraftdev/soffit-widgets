description = "Pomodoro timer — start with: echo $(date +%s) > /tmp/soffit-pomodoro"
components = ["timer", "status"]
has_compact = true

[colors.active]
label = "Active"
theme_field = "green"

[colors.break]
label = "Break"
theme_field = "orange"

[colors.idle]
label = "Idle"
theme_field = "dim"

[icons.icon]
label = "Icon"
icons_field = "icon"
default_value = "\U0001f345 "
is_char = false

[icons.bell]
label = "Break Bell"
icons_field = "bell"
default_value = "\U0001f514"
is_char = false
