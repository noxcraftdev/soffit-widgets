description = "Claude cache efficiency per session -- health grade + detailed metrics (requires claudelytics)"
components = ["grade", "cold", "hit", "churn"]
has_compact = true

[theme.grade]
label = "Health Grade"
palette_role = "success"

[theme.cold]
label = "Cold (cache miss)"
palette_role = "warning"

[theme.hit]
label = "Hit (cache read)"
palette_role = "success"

[theme.churn]
label = "Churn"
palette_role = "warning"

[theme.label]
label = "Labels"
palette_role = "muted"

[settings.cache_ttl]
label = "Cache TTL (seconds)"
type = "int"
default = 60
min = 10
max = 300

[settings.healthy_threshold]
label = "Healthy hit% threshold"
type = "int"
default = 70
min = 0
max = 100

[settings.moderate_threshold]
label = "Moderate hit% threshold"
type = "int"
default = 40
min = 0
max = 100
