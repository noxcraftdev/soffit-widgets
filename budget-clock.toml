description = "Daily budget pacing — hours remaining at current burn rate (requires claudelytics + CLAUDELYTICS_DAILY_BUDGET)"
components = ["clock"]
has_compact = false

[colors.ok]
label = "OK (>50% remaining)"
theme_field = "green"

[colors.warn]
label = "Warning (10–50% remaining)"
theme_field = "yellow"

[colors.over]
label = "Over / Critical (<10% or over budget)"
theme_field = "red"

[icons.icon]
label = "Icon"
icons_field = "icon"
default_value = ""
is_char = false
